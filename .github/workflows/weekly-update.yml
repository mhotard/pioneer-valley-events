name: Weekly Event Update

on:
  schedule:
    # Every Sunday at 6 AM UTC (2 AM Eastern)
    - cron: '0 6 * * 0'
  workflow_dispatch:  # allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest
    env:
      # Exposed at job level so the digest step's `if:` can detect whether the
      # address secret is configured (and skip the email cleanly if not).
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium

      - name: Lint (blocks deploy on failure)
        run: python -m ruff check .

      - name: Test (blocks deploy on failure)
        run: python -m pytest -v

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline.py

      - name: Check for changes
        id: diff
        run: |
          # docs/data/ covers events.json AND the archive-YYYY.json files
          git add -N docs/data/
          git diff --quiet docs/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated events
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git commit -m "chore: weekly event update $(date -u +'%Y-%m-%d')"
          git push

      # Sends the next-two-weeks digest. Only runs if the pipeline succeeded
      # (a failed run stops the job earlier), so the email always reflects a
      # healthy event set. Skipped automatically if GMAIL_ADDRESS isn't set.
      - name: Email the weekly digest
        if: ${{ env.GMAIL_ADDRESS != '' }}
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # Optional: deliver to a different inbox than the sender. If the
          # MAIL_TO secret is unset, the digest goes to GMAIL_ADDRESS itself.
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python email_digest.py --days 14
