name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Test (pytest)
        run: python -m pytest tests/test_pipeline.py tests/test_base.py tests/test_claude_scraper.py -v
